        BUNDLE_ID: eu.gdziezdzieckiem.stage
    scripts:
    - name: Unpack ZIP
      script: |
        rm -rf unzip_tmp "$APP_DIR"
        mkdir -p unzip_tmp "$APP_DIR"

        if [ ! -f "$ZIP_FILE" ]; then
          echo "Nie znaleziono pliku ZIP: $ZIP_FILE"
          echo "Wrzuć plik $ZIP_FILE do repozytorium obok codemagic.yaml albo zmień ZIP_FILE w vars."
          exit 1
        fi

        unzip -q "$ZIP_FILE" -d unzip_tmp

        PACKAGE_JSON=$(find unzip_tmp -maxdepth 4 -name package.json | head -n 1)

        if [ -z "$PACKAGE_JSON" ]; then
          echo "Nie znaleziono package.json w ZIP."
          exit 1
        fi

        SOURCE_DIR=$(dirname "$PACKAGE_JSON")
        echo "Source directory: $SOURCE_DIR"

        rsync -a "$SOURCE_DIR"/ "$APP_DIR"/
        echo "APP_DIR=$APP_DIR" >> "$CM_ENV"

        echo "Zawartość katalogu aplikacji:"
        ls -la "$APP_DIR"
    - name: Install npm dependencies
      script: |
        cd "$APP_DIR"
        npm config set registry https://registry.npmjs.org/
        echo "Node: $(node --version)"
        echo "npm: $(npm --version)"
        echo "Registry: $(npm config get registry)"
        npm ci --no-audit --no-fund --loglevel=info
    - name: Build web assets
      script: |
        cd "$APP_DIR"
        npm run build
        npm run test:scroll-restore
        npm run test:android-navigation
    - name: Add iOS Capacitor project if missing
      script: |
        cd "$APP_DIR"

        if [ ! -d "ios" ]; then
          npx cap add ios
        fi
    - name: Generate iOS native icons
      script: |
        cd "$APP_DIR"

        echo "Generating iOS launcher icons from bundled assets."
        chmod +x scripts/generate-native-icons-macos.sh
        scripts/generate-native-icons-macos.sh

        ls -la assets || true
        ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset || true
    - name: Sync and patch iOS project
      script: |
        cd "$APP_DIR"

        npx cap sync ios
        node scripts/patch-ios.js
        npm run test:location
    - name: Configure iOS simulator version
      script: |
        cd "$APP_DIR"

        python3 <<'PY'
        from pathlib import Path
        import os
        import re
        import sys
        from datetime import datetime, timezone

        version_name = os.environ.get("IOS_VERSION_NAME", "2.7.0")
        base = datetime(2026, 1, 1, tzinfo=timezone.utc)
        now = datetime.now(timezone.utc)
        build_number = str(1000000000 + int((now - base).total_seconds() // 60))

        pbxproj = Path("ios/App/App.xcodeproj/project.pbxproj")

        if not pbxproj.exists():
            print("Nie znaleziono ios/App/App.xcodeproj/project.pbxproj")
            sys.exit(1)

        text = pbxproj.read_text()
        text = re.sub(r"MARKETING_VERSION = [^;]+;", f"MARKETING_VERSION = {version_name};", text)
        text = re.sub(r"CURRENT_PROJECT_VERSION = [^;]+;", f"CURRENT_PROJECT_VERSION = {build_number};", text)
        pbxproj.write_text(text)

        print(f"iOS simulator MARKETING_VERSION={version_name}")
        print(f"iOS simulator CURRENT_PROJECT_VERSION={build_number}")
        PY
    - name: Install iOS Pods
      script: |
        cd "$APP_DIR/ios/App"
        pod install
    - name: Build iOS simulator app
      script: |
        cd "$APP_DIR"
        mkdir -p build/ios/simulator

        xcodebuild \
          -workspace "$XCODE_WORKSPACE" \
          -scheme "$XCODE_SCHEME" \
          -configuration Debug \
          -sdk iphonesimulator \
          -derivedDataPath build/ios/simulator \
          CODE_SIGNING_ALLOWED=NO \
          build | tee build/ios/simulator/xcodebuild-simulator.log

        SIM_APP_PATH=$(find "$PWD/build/ios/simulator/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name "*.app" -type d | head -n 1)

        if [ -z "$SIM_APP_PATH" ]; then
          echo "Nie znaleziono zbudowanej aplikacji .app dla symulatora."
          find "$PWD/build/ios/simulator" -name "*.app" -type d || true
          exit 1
        fi

        echo "SIM_APP_PATH=$SIM_APP_PATH" >> "$CM_ENV"
        echo "Simulator app: $SIM_APP_PATH"
    - name: Prepare iPhone and iPad simulators
      script: |
        cd "$APP_DIR"
        mkdir -p build/simulator-test

        python3 <<'PY' > build/simulator-test/simulators.env
        import json
        import re
        import subprocess

        def sh(*args):
            return subprocess.check_output(args, text=True)

        runtimes = json.loads(sh("xcrun", "simctl", "list", "runtimes", "-j"))["runtimes"]
        ios_runtimes = [
            r for r in runtimes
            if r.get("isAvailable", True)
            and "iOS" in (r.get("name", "") + r.get("identifier", ""))
            and not r.get("availabilityError")
        ]

        if not ios_runtimes:
            raise SystemExit("Brak dostępnego runtime iOS dla symulatorów.")

        def version_tuple(runtime):
            raw = runtime.get("version", "")
            parts = re.findall(r"\d+", raw)
            return tuple(int(p) for p in parts) if parts else (0,)

        runtime = sorted(ios_runtimes, key=version_tuple)[-1]
        runtime_id = runtime["identifier"]

        devices_json = json.loads(sh("xcrun", "simctl", "list", "devices", "available", "-j"))
        devices = devices_json.get("devices", {}).get(runtime_id, [])

        def existing_device(kind):
            candidates = [d for d in devices if kind.lower() in d.get("name", "").lower()]
            preferred_words = ["Pro", "Air", "16", "15", "14", "13"]
            for word in preferred_words:
                for d in candidates:
                    if word.lower() in d.get("name", "").lower():
                        return d["udid"], d["name"]
            if candidates:
                return candidates[0]["udid"], candidates[0]["name"]
            return None, None

        iphone_udid, iphone_name = existing_device("iPhone")
        ipad_udid, ipad_name = existing_device("iPad")

        devtypes = json.loads(sh("xcrun", "simctl", "list", "devicetypes", "-j"))["devicetypes"]

        def choose_devtype(kind):
            candidates = [d for d in devtypes if kind.lower() in d.get("name", "").lower()]
            preferred = ["Pro", "Air", "16", "15", "14", "13"]
            for word in preferred:
                for d in candidates:
                    if word.lower() in d.get("name", "").lower():
                        return d["identifier"], d["name"]
            if candidates:
                return candidates[0]["identifier"], candidates[0]["name"]
            raise SystemExit(f"Brak typu urządzenia dla: {kind}")

        if not iphone_udid:
            type_id, type_name = choose_devtype("iPhone")
            iphone_name = "GZD iPhone Simulator"
            iphone_udid = sh("xcrun", "simctl", "create", iphone_name, type_id, runtime_id).strip()
            print(f"# Created iPhone simulator from type {type_name}")

        if not ipad_udid:
            type_id, type_name = choose_devtype("iPad")
            ipad_name = "GZD iPad Simulator"
            ipad_udid = sh("xcrun", "simctl", "create", ipad_name, type_id, runtime_id).strip()
            print(f"# Created iPad simulator from type {type_name}")

        print(f"IPHONE_UDID={iphone_udid}")
        print(f"IPHONE_NAME={iphone_name}")
        print(f"IPAD_UDID={ipad_udid}")
        print(f"IPAD_NAME={ipad_name}")
        print(f"IOS_RUNTIME={runtime_id}")
        PY

        cat build/simulator-test/simulators.env
        cat build/simulator-test/simulators.env >> "$CM_ENV"
    - name: Run app on iPhone simulator
      script: |
        cd "$APP_DIR"

        mkdir -p build/simulator-test/iphone

        echo "iPhone simulator: $IPHONE_NAME / $IPHONE_UDID"

        xcrun simctl shutdown "$IPHONE_UDID" || true
        xcrun simctl boot "$IPHONE_UDID" || true
        xcrun simctl bootstatus "$IPHONE_UDID" -b

        xcrun simctl install "$IPHONE_UDID" "$SIM_APP_PATH"
        xcrun simctl launch "$IPHONE_UDID" "$BUNDLE_ID"

        sleep 15

        xcrun simctl io "$IPHONE_UDID" screenshot build/simulator-test/iphone/iphone-start.png
        xcrun simctl terminate "$IPHONE_UDID" "$BUNDLE_ID" || true
    - name: Run app on iPad simulator
      script: |
        cd "$APP_DIR"

        mkdir -p build/simulator-test/ipad

        echo "iPad simulator: $IPAD_NAME / $IPAD_UDID"

        xcrun simctl shutdown "$IPAD_UDID" || true
        xcrun simctl boot "$IPAD_UDID" || true
        xcrun simctl bootstatus "$IPAD_UDID" -b

        xcrun simctl install "$IPAD_UDID" "$SIM_APP_PATH"
        xcrun simctl launch "$IPAD_UDID" "$BUNDLE_ID"

        sleep 15

        xcrun simctl io "$IPAD_UDID" screenshot build/simulator-test/ipad/ipad-start.png
        xcrun simctl terminate "$IPAD_UDID" "$BUNDLE_ID" || true
    artifacts:
    - gzd_app/build/ios/simulator/xcodebuild-simulator.log
    - gzd_app/build/ios/simulator/Build/Products/Debug-iphonesimulator/*.app
    - gzd_app/build/simulator-test/**/*.png
    - /tmp/xcodebuild_logs/*.log
