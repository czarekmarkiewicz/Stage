        version_name = os.environ.get("IOS_VERSION_NAME", "1.1")
        build_number = os.environ.get("IOS_BUILD_NUMBER") or os.environ.get("ANDROID_VERSION_CODE")
        if not build_number:
            from datetime import datetime, timezone
            base = datetime(2026, 1, 1, tzinfo=timezone.utc)
            now = datetime.now(timezone.utc)
            build_number = str(1000000000 + int((now - base).total_seconds() // 60))

        pbxproj = Path("ios/App/App.xcodeproj/project.pbxproj")

        if not pbxproj.exists():
            print("Nie znaleziono ios/App/App.xcodeproj/project.pbxproj")
            sys.exit(1)

        text = pbxproj.read_text()
        text = re.sub(r"MARKETING_VERSION = [^;]+;", f"MARKETING_VERSION = {version_name};", text)
        text = re.sub(r"CURRENT_PROJECT_VERSION = [^;]+;", f"CURRENT_PROJECT_VERSION = {build_number};", text)
        pbxproj.write_text(text)

        print(f"iOS MARKETING_VERSION={version_name}")
        print(f"iOS CURRENT_PROJECT_VERSION={build_number}")
        PY
    - name: Set up iOS code signing
      script: |
        cd "$APP_DIR"
        xcode-project use-profiles
    - name: Install iOS Pods
      script: |
        cd "$APP_DIR/ios/App"
        pod install
    - name: Build iOS IPA
      script: |
        cd "$APP_DIR"

        xcode-project build-ipa \
          --workspace "$XCODE_WORKSPACE" \
          --scheme "$XCODE_SCHEME"
    artifacts:
    - gzd_app/android/app/build/outputs/bundle/release/*.aab
    - gzd_app/android/app/build/outputs/mapping/release/mapping.txt
    - gzd_app/build/ios/ipa/*.ipa
    - /tmp/xcodebuild_logs/*.log
    - ~/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: $GOOGLE_PLAY_TRACK
