    scripts:
    - &id001
      name: Unpack ZIP
      script: |
        set -euo pipefail

        rm -rf unzip_tmp "$APP_DIR"
        mkdir -p unzip_tmp "$APP_DIR"

        if [ ! -f "$ZIP_FILE" ]; then
          echo "Nie znaleziono pliku ZIP: $ZIP_FILE"
          echo "Wrzuć plik $ZIP_FILE do repozytorium obok codemagic.yaml albo zmień ZIP_FILE w vars."
          exit 1
        fi

        unzip -q "$ZIP_FILE" -d unzip_tmp

        PACKAGE_JSON=$(find unzip_tmp -maxdepth 4 -name package.json | head -n 1)

        if [ -z "$PACKAGE_JSON" ]; then
          echo "Nie znaleziono package.json w ZIP."
          exit 1
        fi

        SOURCE_DIR=$(dirname "$PACKAGE_JSON")
        echo "Source directory: $SOURCE_DIR"

        rsync -a "$SOURCE_DIR"/ "$APP_DIR"/
        echo "APP_DIR=$APP_DIR" >> "$CM_ENV"

        echo "Zawartość katalogu aplikacji:"
        ls -la "$APP_DIR"
    - &id002
      name: Install npm dependencies
      script: |
        set -euo pipefail
        cd "$APP_DIR"
        npm config set registry https://registry.npmjs.org/
        echo "Node: $(node --version)"
        echo "npm: $(npm --version)"
        echo "Registry: $(npm config get registry)"
        npm ci --no-audit --no-fund --loglevel=info
    - &id003
      name: Add screenshot JS helper
      script: |
        set -euo pipefail
        cd "$APP_DIR"

        python3 <<'PY'
        from pathlib import Path

        inject_block = r'''
              var gzdShot = '';
              try { gzdShot = String(new URLSearchParams(location.search || '').get('gzd_screen') || '').toLowerCase(); } catch (_) {}

              if (gzdShot === 'start') {
                renderHome();
                return;
              }

              if (gzdShot === 'favorites' || gzdShot === 'ulubione') {
                renderListScreen('favorites');
                return;
              }

              if (gzdShot === 'recent' || gzdShot === 'ostatnio') {
                renderListScreen('recent');
                return;
              }
        '''

        helper = r'''
          window.__GZD_SCREENSHOT_ACCEPT_COOKIES__ = function() {
            try {
              var words = ['akcept', 'zgadzam', 'accept', 'agree', 'allow', 'ok'];
              var selectors = ['#CybotCookiebotDialogBodyLevelButtonLevelOptinAllowAll','#cookie_action_close_header','#wt-cli-accept-all-btn','.cky-btn-accept','.cmplz-accept','.cookie-accept','[data-cky-tag="accept-button"]','button','a'];
              function visible(el){if(!el)return false;var r=el.getBoundingClientRect();var s=window.getComputedStyle(el);return r.width>10&&r.height>10&&s.display!=='none'&&s.visibility!=='hidden'&&s.opacity!=='0';}
              function goodText(el){var txt=((el.innerText||el.textContent||el.getAttribute('aria-label')||el.getAttribute('title')||'')+'').toLowerCase();for(var i=0;i<words.length;i++){if(txt.indexOf(words[i])!==-1)return true;}return false;}
              for(var s=0;s<selectors.length;s++){var els=document.querySelectorAll(selectors[s]);for(var i=0;i<els.length;i++){if(visible(els[i])&&goodText(els[i])){els[i].click();return true;}}}
            } catch(e) {}
            return false;
          };
        '''

        for rel in ["src/gzd-app-ui.js", "dist/gzd-app-ui.js"]:
            path = Path(rel)
            if not path.exists():
                continue

            source = path.read_text(encoding="utf-8")

            if "gzd_screen" not in source:
                marker = "      hideGooglePlayReferences();\n\n      const place = readPlaceData();"
                if marker not in source:
                    raise SystemExit(f"Nie znaleziono miejsca na gzd_screen w {rel}")
                source = source.replace(
                    marker,
                    "      hideGooglePlayReferences();\n" + inject_block + "\n      const place = readPlaceData();",
                    1
                )
                print(f"Dodano obsługę ?gzd_screen=... do {rel}")

            if "__GZD_SCREENSHOT_ACCEPT_COOKIES__" not in source:
                marker = "  window.__GZD_RENDER_HOME__ = function () {"
                if marker not in source:
                    raise SystemExit(f"Nie znaleziono markera __GZD_RENDER_HOME__ w {rel}")
                source = source.replace(marker, helper + "\n\n" + marker, 1)
                print(f"Dodano helper cookies do {rel}")

            path.write_text(source, encoding="utf-8")
        PY
    - &id004
      name: Build web assets
      script: |
        set -euo pipefail
        cd "$APP_DIR"
        npm run build
        npm run test:scroll-restore
        npm run test:android-navigation
    - &id005
      name: Add iOS Capacitor project if missing
      script: |
        set -euo pipefail
        cd "$APP_DIR"

        if [ ! -d "ios" ]; then
          npx cap add ios
        fi
    - &id006
      name: Generate iOS native icons
      script: |
        set -euo pipefail
        cd "$APP_DIR"

        chmod +x scripts/generate-native-icons-macos.sh
        scripts/generate-native-icons-macos.sh

        ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset || true
    - &id007
      name: Sync and patch iOS project
      script: |
        set -euo pipefail
        cd "$APP_DIR"

        npx cap sync ios
        node scripts/patch-ios.js
        npm run test:location
    - &id008
      name: Add screenshot launch automation
      script: |
        set -euo pipefail
        cd "$APP_DIR"

        python3 <<'PY'
        from pathlib import Path

        swift_path = Path("ios/App/App/AppDelegate.swift")
        source = swift_path.read_text(encoding="utf-8")

        if "GZDScreenshotLaunchScreenV9" not in source:
            marker = "    override func viewDidLoad() {\n        super.viewDidLoad()"
            if marker not in source:
                raise SystemExit("Nie znaleziono viewDidLoad w GZDViewController.")

            source = source.replace(
                marker,
                marker + "\n        prepareGZDScreenshotLaunchScreenV9()",
                1
            )

            method = r'''
            private func prepareGZDScreenshotLaunchScreenV9() {
                guard let screenRaw = ProcessInfo.processInfo.environment["GZD_SCREENSHOT_SCREEN"], screenRaw.isEmpty == false else {
                    return
                }

                let screen = screenRaw.lowercased()
                var urlText = "https://stage.gdziezdzieckiem.eu/?gzd_screen=start"

                if screen == "favorites" || screen == "ulubione" {
                    urlText = "https://stage.gdziezdzieckiem.eu/?gzd_screen=favorites"
                } else if screen == "recent" || screen == "ostatnio" {
                    urlText = "https://stage.gdziezdzieckiem.eu/?gzd_screen=recent"
                } else if screen == "map" || screen == "wyszukaj" {
                    urlText = "https://stage.gdziezdzieckiem.eu/?gzd_app_map=1#brxe-qnovlp"
                }

                DispatchQueue.main.async { [weak self] in
                    guard let self = self, let url = URL(string: urlText) else { return }
                    self.gzdNavigationStack.removeAll()
                    self.webView?.scrollView.setContentOffset(.zero, animated: false)
                    self.webView?.load(URLRequest(url: url))
                }

                let delays: [Double] = [3.0, 6.0, 10.0, 15.0, 22.0, 30.0]
                for delay in delays {
                    DispatchQueue.main.asyncAfter(deadline: .now() + delay) { [weak self] in
                        self?.acceptGZDScreenshotCookiesV9()
                        if screen == "map" || screen == "wyszukaj" {
                            self?.openMapSectionInApp()
                        }
                    }
                }
            }

            private func acceptGZDScreenshotCookiesV9() {
                let js = #"(function(){try{if(window.__GZD_SCREENSHOT_ACCEPT_COOKIES__){window.__GZD_SCREENSHOT_ACCEPT_COOKIES__();}var words=['akcept','zgadzam','accept','agree','allow','ok'];var selectors=['#CybotCookiebotDialogBodyLevelButtonLevelOptinAllowAll','#cookie_action_close_header','#wt-cli-accept-all-btn','.cky-btn-accept','.cmplz-accept','.cookie-accept','[data-cky-tag="accept-button"]','button','a'];function visible(el){if(!el)return false;var r=el.getBoundingClientRect();var s=window.getComputedStyle(el);return r.width>10&&r.height>10&&s.display!=='none'&&s.visibility!=='hidden'&&s.opacity!=='0';}function goodText(el){var txt=((el.innerText||el.textContent||el.getAttribute('aria-label')||el.getAttribute('title')||'')+'').toLowerCase();for(var i=0;i<words.length;i++){if(txt.indexOf(words[i])!==-1)return true;}return false;}for(var s=0;s<selectors.length;s++){var els=document.querySelectorAll(selectors[s]);for(var i=0;i<els.length;i++){if(visible(els[i])&&goodText(els[i])){els[i].click();return true;}}}}catch(e){}return false;})();"#

                DispatchQueue.main.async { [weak self] in
                    self?.webView?.evaluateJavaScript(js, completionHandler: nil)
                }
            }

        '''

            end_marker = "\n    private func showStartupSplashOverlay()"
            if end_marker not in source:
                raise SystemExit("Nie znaleziono miejsca na metody screenshotów.")

            source = source.replace(end_marker, "\n" + method + end_marker, 1)
            swift_path.write_text(source, encoding="utf-8")
            print("Dodano screenshot mode V9 do AppDelegate.swift.")
        else:
            print("Screenshot mode V9 już istnieje.")

        bad = []
        for i, line in enumerate(swift_path.read_text(encoding="utf-8").splitlines(), 1):
            if "\\/" in line or "\\." in line:
                bad.append((i, line.strip()))

        if bad:
            print("Podejrzane escape w Swift:")
            for item in bad[:20]:
                print(item)
            raise SystemExit(1)

        print("Screenshot launch V9 patch OK")
        PY
    - &id009
      name: Configure iOS simulator version
      script: |
        set -euo pipefail
        cd "$APP_DIR"

        python3 <<'PY'
        from pathlib import Path
        import os
        import re
        import sys
        from datetime import datetime, timezone

        version_name = os.environ.get("IOS_VERSION_NAME", "2.9.0")
        base = datetime(2026, 1, 1, tzinfo=timezone.utc)
        now = datetime.now(timezone.utc)
        build_number = str(1000000000 + int((now - base).total_seconds() // 60))

        pbxproj = Path("ios/App/App.xcodeproj/project.pbxproj")
        if not pbxproj.exists():
            print("Nie znaleziono ios/App/App.xcodeproj/project.pbxproj")
            sys.exit(1)

        text = pbxproj.read_text()
        text = re.sub(r"MARKETING_VERSION = [^;]+;", f"MARKETING_VERSION = {version_name};", text)
        text = re.sub(r"CURRENT_PROJECT_VERSION = [^;]+;", f"CURRENT_PROJECT_VERSION = {build_number};", text)
        pbxproj.write_text(text)

        print(f"iOS screenshot MARKETING_VERSION={version_name}")
        print(f"iOS screenshot CURRENT_PROJECT_VERSION={build_number}")
        PY
    - &id010
      name: Install iOS Pods
      script: |
        set -euo pipefail
        cd "$APP_DIR/ios/App"
        pod install
    - &id011
      name: Build iOS simulator app
      script: |
        set -euo pipefail
        cd "$APP_DIR"
        mkdir -p build/ios/simulator

        set -o pipefail

        # iPhone i iPad używają tego samego SDK: iphonesimulator.
        xcodebuild \
          -workspace "$XCODE_WORKSPACE" \
          -scheme "$XCODE_SCHEME" \
          -configuration Debug \
          -sdk iphonesimulator \
          -derivedDataPath build/ios/simulator \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          build | tee build/ios/simulator/xcodebuild-screenshots.log

        SIM_APP_PATH=$(find "$PWD/build/ios/simulator/Build/Products/Debug-iphonesimulator" -maxdepth 1 -name "*.app" -type d | head -n 1)

        if [ -z "$SIM_APP_PATH" ]; then
          echo "Nie znaleziono zbudowanej aplikacji .app dla symulatora."
          find "$PWD/build/ios/simulator" -name "*.app" -type d || true
          exit 1
        fi

        echo "SIM_APP_PATH=$SIM_APP_PATH" >> "$CM_ENV"
        echo "Simulator app: $SIM_APP_PATH"
    - name: Prepare iPhone simulator
      script: |
        set -euo pipefail
        cd "$APP_DIR"
        mkdir -p build/iphone-screenshots

        python3 <<'PY' > build/iphone-screenshots/simulator.env
        import json
        import re
        import subprocess

        def sh(*args):
            return subprocess.check_output(args, text=True)

        runtimes = json.loads(sh("xcrun", "simctl", "list", "runtimes", "-j"))["runtimes"]
        ios_runtimes = [
            r for r in runtimes
            if r.get("isAvailable", True)
            and "iOS" in (r.get("name", "") + r.get("identifier", ""))
            and not r.get("availabilityError")
        ]

        if not ios_runtimes:
            raise SystemExit("Brak dostępnego runtime iOS dla symulatorów.")

        def version_tuple(runtime):
            raw = runtime.get("version", "")
            parts = re.findall(r"\d+", raw)
            return tuple(int(p) for p in parts) if parts else (0,)

        runtime = sorted(ios_runtimes, key=version_tuple)[-1]
        runtime_id = runtime["identifier"]

        devices_json = json.loads(sh("xcrun", "simctl", "list", "devices", "available", "-j"))
        devices = devices_json.get("devices", {}).get(runtime_id, [])

        preferred_words = ["16 Pro", "15 Pro", "14 Pro", "13 Pro", "16", "15", "14"]
        candidates = [d for d in devices if "iphone" in d.get("name", "").lower()]

        udid = None
        device_name = None

        for word in preferred_words:
            for d in candidates:
                if word.lower() in d.get("name", "").lower():
                    udid = d["udid"]
                    device_name = d["name"]
                    break
            if udid:
                break

        if not udid and candidates:
            udid = candidates[0]["udid"]
            device_name = candidates[0]["name"]

        if not udid:
            devtypes = json.loads(sh("xcrun", "simctl", "list", "devicetypes", "-j"))["devicetypes"]
            types = [d for d in devtypes if "iphone" in d.get("name", "").lower()]
            if not types:
                raise SystemExit("Brak typu urządzenia iPhone.")

            selected_type = None
            for word in preferred_words:
                for d in types:
                    if word.lower() in d.get("name", "").lower():
                        selected_type = d
                        break
                if selected_type:
                    break

            if selected_type is None:
                selected_type = types[-1]

            type_id = selected_type["identifier"]
            device_name = "GZD iPhone Screenshot Simulator"
            udid = sh("xcrun", "simctl", "create", device_name, type_id, runtime_id).strip()

        print(f"IPHONE_UDID={udid}")
        print(f"IPHONE_NAME={device_name}")
        print(f"IOS_RUNTIME={runtime_id}")
        PY

        cat build/iphone-screenshots/simulator.env
        cat build/iphone-screenshots/simulator.env >> "$CM_ENV"
    - name: Capture iPhone screenshots
      script: |
        set -euo pipefail
        cd "$APP_DIR"

        export SCREENSHOT_DIR="$PWD/build/iphone-screenshots"
        mkdir -p "$SCREENSHOT_DIR"

        UDID="${IPHONE_UDID}"
        DEVICE_NAME="${IPHONE_NAME}"

        echo "iPhone simulator: $DEVICE_NAME / $UDID"
        echo "SCREENSHOT_DIR=$SCREENSHOT_DIR"

        xcrun simctl shutdown "$UDID" || true
        xcrun simctl boot "$UDID" || true
        xcrun simctl bootstatus "$UDID" -b

        open -a Simulator --args -CurrentDeviceUDID "$UDID" || true
        sleep 8

        xcrun simctl status_bar "$UDID" override \
          --time 09:41 \
          --wifiBars 3 \
          --cellularBars 4 \
          --batteryState charged \
          --batteryLevel 100 || true

        take_screenshot() {
          local filename="$1"
          local label="$2"
          local path="$SCREENSHOT_DIR/$filename"

          mkdir -p "$SCREENSHOT_DIR"
          echo "Screenshot: $label -> $path"

          for attempt in 1 2 3 4 5; do
            rm -f "$path"

            if xcrun simctl io "$UDID" screenshot "$path"; then
              if [ -s "$path" ]; then
                file "$path" || true
                return 0
              fi
            fi

            echo "Screenshot retry $attempt for $label"
            ls -la "$SCREENSHOT_DIR" || true
            sleep 3
          done

          echo "Nie udało się zapisać screenshotu: $label"
          return 1
        }

        launch_for_screen() {
          local screen="$1"
          local wait_seconds="$2"

          echo "Uruchamiam ekran: $screen"

          xcrun simctl terminate "$UDID" "$BUNDLE_ID" || true
          xcrun simctl uninstall "$UDID" "$BUNDLE_ID" || true
          xcrun simctl install "$UDID" "$SIM_APP_PATH"

          SIMCTL_CHILD_GZD_SCREENSHOT_SCREEN="$screen" \
            xcrun simctl launch --terminate-running-process "$UDID" "$BUNDLE_ID"

          sleep "$wait_seconds"
        }

        launch_for_screen "start" "20"
        take_screenshot "01-start.png" "Start"

        launch_for_screen "map" "44"
        take_screenshot "02-wyszukaj-mapa.png" "Wyszukaj / mapa"

        launch_for_screen "favorites" "22"
        take_screenshot "03-ulubione.png" "Ulubione"

        launch_for_screen "recent" "22"
        take_screenshot "04-ostatnio-ogladane.png" "Ostatnio oglądane"

        xcrun simctl terminate "$UDID" "$BUNDLE_ID" || true
        xcrun simctl status_bar "$UDID" clear || true

        python3 <<'PY'
        from pathlib import Path
        import json
        import os
        from datetime import datetime

        folder = Path(os.environ["SCREENSHOT_DIR"])
        pngs = sorted(folder.glob("*.png"))

        manifest = {
            "created_at": datetime.utcnow().isoformat() + "Z",
            "device": os.environ.get("IPHONE_NAME", ""),
            "udid": os.environ.get("IPHONE_UDID", ""),
            "screenshots": [p.name for p in pngs],
        }

        (folder / "manifest.json").write_text(json.dumps(manifest, ensure_ascii=False, indent=2), encoding="utf-8")

        required = {
            "01-start.png",
            "02-wyszukaj-mapa.png",
            "03-ulubione.png",
            "04-ostatnio-ogladane.png",
        }

        existing = {p.name for p in pngs}
        missing = sorted(required - existing)

        print("PNG files:", sorted(existing))
        if missing:
            print("Brak screenshotów:", missing)
            raise SystemExit(1)
        PY

        cd build
        zip -r iphone-screenshots.zip iphone-screenshots
        cd ..

        echo "Wygenerowane screenshoty:"
        ls -la "$SCREENSHOT_DIR"
    artifacts:
    - gzd_app/build/iphone-screenshots/**
    - gzd_app/build/iphone-screenshots.zip
    - gzd_app/build/ios/simulator/xcodebuild-screenshots.log
    - gzd_app/build/ios/simulator/Build/Products/Debug-iphonesimulator/*.app
    - /tmp/xcodebuild_logs/*.log
