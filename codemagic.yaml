        npm ci --no-audit --no-fund --loglevel=info
    - name: Build web assets
      script: |
        cd "$APP_DIR"
        npm run build
        npm run test:scroll-restore
        npm run test:android-navigation
    - name: Add iOS Capacitor project if missing
      script: |
        cd "$APP_DIR"

        if [ ! -d "ios" ]; then
          npx cap add ios
        fi
    - name: Generate iOS native icons
      script: |
        cd "$APP_DIR"
        chmod +x scripts/generate-native-icons-macos.sh
        scripts/generate-native-icons-macos.sh
    - name: Sync and patch iOS project
      script: |
        cd "$APP_DIR"
        npx cap sync ios
        node scripts/patch-ios.js
        npm run test:location
    - name: Configure iOS simulator version
      script: |
        cd "$APP_DIR"

        python3 <<'PY'
        from pathlib import Path
        import os
        import re
        import sys
        from datetime import datetime, timezone

        version_name = os.environ.get("IOS_VERSION_NAME", "2.8.5")
        base = datetime(2026, 1, 1, tzinfo=timezone.utc)
        now = datetime.now(timezone.utc)
        build_number = str(1000000000 + int((now - base).total_seconds() // 60))

        pbxproj = Path("ios/App/App.xcodeproj/project.pbxproj")

        if not pbxproj.exists():
            print("Nie znaleziono ios/App/App.xcodeproj/project.pbxproj")
            sys.exit(1)

        text = pbxproj.read_text()
        text = re.sub(r"MARKETING_VERSION = [^;]+;", f"MARKETING_VERSION = {version_name};", text)
        text = re.sub(r"CURRENT_PROJECT_VERSION = [^;]+;", f"CURRENT_PROJECT_VERSION = {build_number};", text)
        pbxproj.write_text(text)

        print(f"iOS simulator MARKETING_VERSION={version_name}")
        print(f"iOS simulator CURRENT_PROJECT_VERSION={build_number}")
        PY
    - name: Install iOS Pods
      script: |
        cd "$APP_DIR/ios/App"
        pod install
    - name: Build previewable iOS simulator .app
      script: |
        cd "$APP_DIR"

        # App Preview wymaga unsigned .app zbudowanego dla iOS Simulator.
        # Zostawiamy domyślny DerivedData, bo Codemagic rozpoznaje .app właśnie z tego miejsca.
        set -o pipefail

        xcodebuild build \
          -workspace "$XCODE_WORKSPACE" \
          -scheme "$XCODE_SCHEME" \
          -sdk iphonesimulator \
          -destination 'generic/platform=iOS Simulator' \
          -configuration Debug \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO | tee "$CM_BUILD_DIR/xcodebuild-app-preview.log"

        echo "Wszystkie znalezione katalogi .app:"
        find "$HOME/Library/Developer/Xcode/DerivedData" -type d -name "*.app" -print || true

        APP_PATH="$(
          find "$HOME/Library/Developer/Xcode/DerivedData" -type d -name "*.app" -prune | while read -r app; do
            if [ -f "$app/Info.plist" ]; then
              echo "$app"
              break
            fi
          done
        )"

        if [ -z "$APP_PATH" ]; then
          echo "Nie znaleziono poprawnego .app z Info.plist."
          echo "Lista Info.plist w DerivedData:"
          find "$HOME/Library/Developer/Xcode/DerivedData" -name Info.plist -print || true
          exit 1
        fi

        echo "OK: poprawny .app dla App Preview:"
        echo "$APP_PATH"

        /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" "$APP_PATH/Info.plist" || true
        /usr/libexec/PlistBuddy -c "Print :CFBundleExecutable" "$APP_PATH/Info.plist" || true

        echo "APP_PREVIEW_APP_PATH=$APP_PATH" >> "$CM_ENV"
    artifacts:
    - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
    - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    - $CM_BUILD_DIR/xcodebuild-app-preview.log
  ios-iphone-screenshots-from-zip:
    name: iPhone screenshots - Start / Wyszukaj / Ulubione / Ostatnio
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      cocoapods: default
