workflows:
  android-apk-manual-from-zip:
    name: Stage GZD - Android APK (manual install, no publish)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
      java: 21
      android_signing:
      - gzd_android_keystore
      vars:
        ZIP_FILE: stage-gzd-capacitor-v2.9.0.zip
        APP_DIR: gzd_app
        ANDROID_VERSION_NAME: 2.9.0
    scripts:
    - name: Unpack ZIP
      script: |
        rm -rf unzip_tmp "$APP_DIR"
        mkdir -p unzip_tmp "$APP_DIR"

        if [ ! -f "$ZIP_FILE" ]; then
          echo "Nie znaleziono pliku ZIP: $ZIP_FILE"
          echo "Wrzuć plik $ZIP_FILE do repozytorium obok codemagic.yaml albo zmień ZIP_FILE w vars."
          exit 1
        fi

        unzip -q "$ZIP_FILE" -d unzip_tmp

        PACKAGE_JSON=$(find unzip_tmp -maxdepth 4 -name package.json | head -n 1)

        if [ -z "$PACKAGE_JSON" ]; then
          echo "Nie znaleziono package.json w ZIP."
          exit 1
        fi

        SOURCE_DIR=$(dirname "$PACKAGE_JSON")
        echo "Source directory: $SOURCE_DIR"

        rsync -a "$SOURCE_DIR"/ "$APP_DIR"/
        echo "APP_DIR=$APP_DIR" >> "$CM_ENV"

        echo "Zawartość katalogu aplikacji:"
        ls -la "$APP_DIR"
    - name: Install npm dependencies
      script: |
        cd "$APP_DIR"
        npm config set registry https://registry.npmjs.org/
        echo "Node: $(node --version)"
        echo "npm: $(npm --version)"
        echo "Registry: $(npm config get registry)"
        npm ci --no-audit --no-fund --loglevel=info
    - name: Build web assets
      script: |
        cd "$APP_DIR"
        npm run build
        npm run test:scroll-restore
        npm run test:android-navigation
    - name: Add Android Capacitor project if missing
      script: |
        cd "$APP_DIR"

        if [ ! -d "android" ]; then
          npx cap add android
        fi
    - name: Generate Android launcher icons
      script: |
        cd "$APP_DIR"

        echo "Generating Android launcher icons from bundled assets."
        chmod +x scripts/generate-native-icons-macos.sh
        scripts/generate-native-icons-macos.sh

        ls -la assets || true
        ls -la android/app/src/main/res/mipmap-xxxhdpi || true
    - name: Sync and patch Android project
      script: |
        cd "$APP_DIR"

        npx cap sync android
        node scripts/patch-android.js
        npm run test:generated-android
        npm run test:location
    - name: Calculate automatic Android build number
      script: |
        cd "$APP_DIR"

        AUTO_BUILD_NUMBER=$(python3 <<'PY'
        from datetime import datetime, timezone

        # 1 000 000 000 + liczba minut od 2026-01-01 UTC.
        base = datetime(2026, 1, 1, tzinfo=timezone.utc)
        now = datetime.now(timezone.utc)
        print(1000000000 + int((now - base).total_seconds() // 60))
        PY
        )

        echo "ANDROID_VERSION_CODE=$AUTO_BUILD_NUMBER" >> "$CM_ENV"
        echo "Automatic Android versionCode: $AUTO_BUILD_NUMBER"
    - name: Configure Android version and signing
      script: |
        cd "$APP_DIR"

        cat > android/keystore.properties <<EOF
        storeFile=$CM_KEYSTORE_PATH
        storePassword=$CM_KEYSTORE_PASSWORD
        keyAlias=$CM_KEY_ALIAS
        keyPassword=$CM_KEY_PASSWORD
        EOF

        python3 <<'PY'
        from pathlib import Path
        import os
        import re
        import sys

        build_file = Path("android/app/build.gradle")

        if not build_file.exists():
            print("Nie znaleziono android/app/build.gradle")
            sys.exit(1)

        text = build_file.read_text()

        version_code = os.environ.get("ANDROID_VERSION_CODE")
        if not version_code:
            from datetime import datetime, timezone
            base = datetime(2026, 1, 1, tzinfo=timezone.utc)
            now = datetime.now(timezone.utc)
            version_code = str(1000000000 + int((now - base).total_seconds() // 60))

        version_name = os.environ.get("ANDROID_VERSION_NAME", "1.1")

        text = re.sub(r"versionCode\s+\d+", f"versionCode {version_code}", text)
        text = re.sub(r'versionName\s+"[^"]+"', f'versionName "{version_name}"', text)

        def find_matching_brace(source, open_brace_index):
            depth = 0
            for i in range(open_brace_index, len(source)):
                ch = source[i]
                if ch == "{":
                    depth += 1
                elif ch == "}":
                    depth -= 1
                    if depth == 0:
                        return i
            return -1

        def find_block(source, block_name, start=0, end=None):
            if end is None:
                end = len(source)
            pattern = re.compile(r"(^|\n)([ \t]*)" + re.escape(block_name) + r"\s*\{")
            match = pattern.search(source, start, end)
            if not match:
                return None
            open_index = source.find("{", match.start(), match.end())
            close_index = find_matching_brace(source, open_index)
            if close_index == -1:
                return None
            return {
                "match_start": match.start(),
                "match_end": match.end(),
                "open": open_index,
                "close": close_index,
                "indent": match.group(2),
            }

        keystore_block = """def keystoreProperties = new Properties()
        def keystorePropertiesFile = rootProject.file('keystore.properties')
        if (keystorePropertiesFile.exists()) {
            keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
        }

        """

        if "keystorePropertiesFile = rootProject.file('keystore.properties')" not in text:
            plugins_block = find_block(text, "plugins")
            if plugins_block:
                insert_at = plugins_block["close"] + 1
                text = text[:insert_at] + "\n\n" + keystore_block + text[insert_at:]
            else:
                text = keystore_block + text

        android_block = find_block(text, "android")
        if not android_block:
            print("Nie znaleziono bloku android { ... } w build.gradle")
            sys.exit(1)

        android_body = text[android_block["open"] + 1:android_block["close"]]

        if "signingConfigs {" not in android_body:
            build_types = find_block(text, "buildTypes", android_block["open"], android_block["close"])
            signing_configs_block = """    signingConfigs {
                release {
                    keyAlias keystoreProperties['keyAlias']
                    keyPassword keystoreProperties['keyPassword']
                    storeFile file(keystoreProperties['storeFile'])
                    storePassword keystoreProperties['storePassword']
                }
            }

        """
            if build_types:
                text = text[:build_types["match_start"] + 1] + signing_configs_block + text[build_types["match_start"] + 1:]
            else:
                insert_at = android_block["close"]
                text = text[:insert_at] + "\n" + signing_configs_block + text[insert_at:]

        android_block = find_block(text, "android")
        build_types = find_block(text, "buildTypes", android_block["open"], android_block["close"])

        if not build_types:
            insert_at = android_block["close"]
            text = text[:insert_at] + """
            buildTypes {
                release {
                    signingConfig signingConfigs.release
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                }
            }
        """ + text[insert_at:]
        else:
            release_block = find_block(text, "release", build_types["open"], build_types["close"])
            if not release_block:
                insert_at = build_types["open"] + 1
                text = text[:insert_at] + """
                release {
                    signingConfig signingConfigs.release
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                }
        """ + text[insert_at:]
            else:
                release_body = text[release_block["open"] + 1:release_block["close"]]
                if "signingConfig signingConfigs.release" not in release_body:
                    insert_at = release_block["open"] + 1
                    text = text[:insert_at] + "\n            signingConfig signingConfigs.release" + text[insert_at:]

        build_file.write_text(text)
        PY

        echo "Android build.gradle po konfiguracji:"
        grep -n "versionCode\|versionName\|signingConfig\|signingConfigs" android/app/build.gradle || true
    - name: Build signed Android APK
      script: |
        cd "$APP_DIR/android"
        chmod +x ./gradlew
        ./gradlew assembleRelease
    artifacts:
    - gzd_app/android/app/build/outputs/apk/release/*.apk
  build-from-zip:
    name: Build Android + iOS from ZIP
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Gdzie z dzieckiem API
    environment:
      node: 22
      xcode: latest
      cocoapods: default
      java: 21
      android_signing:
      - gzd_android_keystore
      ios_signing:
        distribution_type: app_store
        bundle_identifier: eu.gdziezdzieckiem.stage
      vars:
        ZIP_FILE: stage-gzd-capacitor-v2.9.0.zip
        APP_DIR: gzd_app
        ANDROID_VERSION_NAME: 2.9.0
        IOS_VERSION_NAME: 2.9.0
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        BUNDLE_ID: eu.gdziezdzieckiem.stage
    scripts:
    - name: Unpack ZIP
      script: |
        rm -rf unzip_tmp "$APP_DIR"
        mkdir -p unzip_tmp "$APP_DIR"

        if [ ! -f "$ZIP_FILE" ]; then
          echo "Nie znaleziono pliku ZIP: $ZIP_FILE"
          echo "Wrzuć plik $ZIP_FILE do repozytorium obok codemagic.yaml albo zmień ZIP_FILE w vars."
          exit 1
        fi

        unzip -q "$ZIP_FILE" -d unzip_tmp

        PACKAGE_JSON=$(find unzip_tmp -maxdepth 4 -name package.json | head -n 1)

        if [ -z "$PACKAGE_JSON" ]; then
          echo "Nie znaleziono package.json w ZIP."
          exit 1
        fi

        SOURCE_DIR=$(dirname "$PACKAGE_JSON")
        echo "Source directory: $SOURCE_DIR"

        rsync -a "$SOURCE_DIR"/ "$APP_DIR"/
        echo "APP_DIR=$APP_DIR" >> "$CM_ENV"

        echo "Zawartość katalogu aplikacji:"
        ls -la "$APP_DIR"
    - name: Install npm dependencies
      script: |
        cd "$APP_DIR"
        npm config set registry https://registry.npmjs.org/
        echo "Node: $(node --version)"
        echo "npm: $(npm --version)"
        echo "Registry: $(npm config get registry)"
        npm ci --no-audit --no-fund --loglevel=info
    - name: Build web assets
      script: |
        cd "$APP_DIR"
        npm run build
        npm run test:scroll-restore
        npm run test:android-navigation
    - name: Add native Capacitor projects if missing
      script: |
        cd "$APP_DIR"

        if [ ! -d "android" ]; then
          npx cap add android
        fi

        if [ ! -d "ios" ]; then
          npx cap add ios
        fi
    - name: Generate native icons with macOS sips
      script: |
        cd "$APP_DIR"

        echo "Generating Android and iOS launcher icons from bundled assets without capacitor-assets."
        chmod +x scripts/generate-native-icons-macos.sh
        scripts/generate-native-icons-macos.sh

        ls -la assets || true
        ls -la android/app/src/main/res/mipmap-xxxhdpi || true
        ls -la ios/App/App/Assets.xcassets/AppIcon.appiconset || true
    - name: Sync and patch Capacitor projects
      script: |
        cd "$APP_DIR"

        npx cap sync android
        npx cap sync ios

        node scripts/patch-android.js
        npm run test:generated-android
        node scripts/patch-ios.js
        npm run test:location
    - name: Verify v2.9.0 fixes
      script: |
        cd "$APP_DIR"
        echo "Expected app ZIP: stage-gzd-capacitor-v2.9.0.zip"

        test "$(node -p "require('./package.json').version")" = "2.9.0"
        npm run test:scroll-restore
        npm run test:android-navigation
        npm run test:generated-android
        npm run test:location
        node --check src/gzd-app-ui.js
        node --check scripts/patch-android.js
        node --check scripts/patch-ios.js

        ANDROID_MAIN="android/app/src/main/java/eu/gdziezdzieckiem/stage/MainActivity.java"
        ANDROID_MANIFEST="android/app/src/main/AndroidManifest.xml"
        IOS_DELEGATE="ios/App/App/AppDelegate.swift"
        IOS_PLIST="ios/App/App/Info.plist"
        WEB_UI="dist/gzd-app-ui.js"
        WEB_SCROLL="dist/gzd-scroll-restore.js"

        test -s "$WEB_SCROLL"
        grep -Fq 'android-native-v2.9.0' "$ANDROID_MAIN"
        grep -Fq 'navigateToUrlNow(previous, false, true, commandId);' "$ANDROID_MAIN"
        grep -Fq 'private int navigationCommandId = 0;' "$ANDROID_MAIN"
        grep -Fq 'private boolean backNavigationInProgress = false;' "$ANDROID_MAIN"
        grep -Fq 'private void requestBackNavigation()' "$ANDROID_MAIN"
        grep -Fq 'if (now - lastBackActionAt < 350) return;' "$ANDROID_MAIN"
        grep -Fq 'if (commandId != navigationCommandId) return;' "$ANDROID_MAIN"
        grep -Fq 'boolean serverRedirect = Build.VERSION.SDK_INT >= Build.VERSION_CODES.N && request.isRedirect();' "$ANDROID_MAIN"
        grep -Fq 'if (serverRedirect || isActiveLoadContinuation(url)) return false;' "$ANDROID_MAIN"
        grep -Fq 'if ("about:blank".equals(url) || !isCurrentWebViewCallback(view, url)) return;' "$ANDROID_MAIN"
        grep -Fq 'if (backNavigationInProgress || (appInitiatedLoad && "loading".equals(mode))) return;' "$ANDROID_MAIN"
        grep -Fq 'webView.loadUrl("about:blank")' "$ANDROID_MAIN"
        grep -Fq 'try { view.clearHistory(); }' "$ANDROID_MAIN"
        grep -Fq 'public/gzd-scroll-restore.js' "$ANDROID_MAIN"
        grep -Fq 'injectNavigationStateScript' "$ANDROID_MAIN"
        if grep -Fq 'webView.goBack()' "$ANDROID_MAIN" || grep -Fq 'webView.canGoBack()' "$ANDROID_MAIN" || grep -Fq 'restoreOnNextLoad' "$ANDROID_MAIN"; then
          echo "ERROR: Android zawiera stary mechanizm natywnego cofania WebView."
          exit 1
        fi
        grep -Fq 'WindowInsets.Type.displayCutout()' "$ANDROID_MAIN"
        grep -Fq 'createLandscapeHomeHero()' "$ANDROID_MAIN"
        grep -Fq 'setImageFromAsset(bg, "public/hero-art.png")' "$ANDROID_MAIN"
        grep -Fq 'TextView h = tv("Co dziś robimy\nz dzieckiem?"' "$ANDROID_MAIN"
        grep -Fq 'TextView s = tv("Znajdź atrakcje, miejsca\ni pomysły na wspólny czas."' "$ANDROID_MAIN"
        grep -Fq 'TextView version = tv("v2.9.0"' "$ANDROID_MAIN"
        grep -Fq 'settings.setGeolocationEnabled(true);' "$ANDROID_MAIN"
        grep -Fq 'onGeolocationPermissionsShowPrompt' "$ANDROID_MAIN"
        grep -Fq 'requestPermissions(' "$ANDROID_MAIN"
        grep -Fq 'onRequestPermissionsResult' "$ANDROID_MAIN"
        grep -Fq 'isTrustedGeolocationOrigin' "$ANDROID_MAIN"
        grep -Fq 'Manifest.permission.ACCESS_FINE_LOCATION' "$ANDROID_MAIN"
        grep -Fq 'Manifest.permission.ACCESS_COARSE_LOCATION' "$ANDROID_MAIN"
        grep -Fq 'android.permission.ACCESS_FINE_LOCATION' "$ANDROID_MANIFEST"
        grep -Fq 'android.permission.ACCESS_COARSE_LOCATION' "$ANDROID_MANIFEST"

        grep -Fq 'let performLoad =' "$IOS_DELEGATE"
        grep -Fq 'if webView.canGoBack' "$IOS_DELEGATE"
        grep -Fq 'self.gzdRestoringBackNavigation = true' "$IOS_DELEGATE"
        grep -Fq -- '--gzd-native-safe-left' "$IOS_DELEGATE"
        grep -Fq '__GZD_RESTORE_SCROLL_STATE__' "$IOS_DELEGATE"
        swiftc -frontend -parse "$IOS_DELEGATE"
        grep -Fq '<key>NSLocationWhenInUseUsageDescription</key>' "$IOS_PLIST"
        grep -Fq 'Zlokalizuj mnie' "$IOS_PLIST"

        grep -Fq '@media (orientation: landscape)' "$WEB_UI"
        grep -Fq 'aspect-ratio: 1536 / 653' "$WEB_UI"
        grep -Fq 'gzd_navigation_scroll_v2:' "$WEB_UI"
        grep -Fq 'anchorOccurrence:' "$WEB_UI"
        grep -Fq 'anchorIndex:' "$WEB_UI"
        grep -Fq 'findAnchorBySavedIndex' "$WEB_UI"
        grep -Fq 'triggerProgressiveListLoad' "$WEB_UI"
        grep -Fq "history.scrollRestoration = 'manual'" "$WEB_UI"
        grep -Fq '__GZD_SCROLL_RESTORE_ACTIVE__' "$WEB_UI"
        grep -Fq 'Ładowanie...' "$WEB_UI"
        grep -Fq '__GZD_APP_UI_V42__' "$WEB_UI"
        grep -Fq 'gzd-hero-banner-copy' "$WEB_UI"
        grep -Fq 'v2.9.0</div>' "$WEB_UI"

        grep -Fq '__GZD_SCROLL_RESTORE_MODULE_V3__' "$WEB_SCROLL"
        grep -Fq 'gzd_navigation_scroll_v2:' "$WEB_SCROLL"
        grep -Fq 'anchorIndex:' "$WEB_SCROLL"
        grep -Fq 'triggerProgressiveListLoad' "$WEB_SCROLL"
        grep -Fq 'exactLoadMore' "$WEB_SCROLL"
        grep -Fq "history.scrollRestoration = 'manual'" "$WEB_SCROLL"

        if grep -n "TextView decoration\|👧\|👦\|🎈\|☁️" "$ANDROID_MAIN"; then
          echo "ERROR: Wygenerowany MainActivity.java zawiera stary blok dekoracji emoji."
          exit 1
        fi

        if grep -Fq '__GZD_APP_UI_V40__' "$WEB_UI"; then
          echo "ERROR: Wygenerowane zasoby zawierają stary identyfikator skryptu V40."
          exit 1
        fi

        echo "Weryfikacja poprawek v2.9.0 zakończona powodzeniem."
    - name: Calculate automatic build numbers
      script: |
        cd "$APP_DIR"

        AUTO_BUILD_NUMBER=$(python3 <<'PY'
        from datetime import datetime, timezone

        # Numer budowania liczony automatycznie:
        # 1 000 000 000 + liczba minut od 2026-01-01 UTC.
        # Jest większy od dotychczasowych numerów w Google Play
        # i rośnie automatycznie przy kolejnych buildach.
        base = datetime(2026, 1, 1, tzinfo=timezone.utc)
        now = datetime.now(timezone.utc)
        print(1000000000 + int((now - base).total_seconds() // 60))
        PY
        )

        echo "ANDROID_VERSION_CODE=$AUTO_BUILD_NUMBER" >> "$CM_ENV"
        echo "IOS_BUILD_NUMBER=$AUTO_BUILD_NUMBER" >> "$CM_ENV"

        echo "Automatic Android versionCode: $AUTO_BUILD_NUMBER"
        echo "Automatic iOS build number: $AUTO_BUILD_NUMBER"
    - name: Configure Android version and signing
      script: |
        cd "$APP_DIR"

        cat > android/keystore.properties <<EOF
        storeFile=$CM_KEYSTORE_PATH
        storePassword=$CM_KEYSTORE_PASSWORD
        keyAlias=$CM_KEY_ALIAS
        keyPassword=$CM_KEY_PASSWORD
        EOF

        python3 <<'PY'
        from pathlib import Path
        import os
        import re
        import sys

        build_file = Path("android/app/build.gradle")

        if not build_file.exists():
            print("Nie znaleziono android/app/build.gradle")
            sys.exit(1)

        text = build_file.read_text()

        version_code = os.environ.get("ANDROID_VERSION_CODE")
        if not version_code:
            from datetime import datetime, timezone
            base = datetime(2026, 1, 1, tzinfo=timezone.utc)
            now = datetime.now(timezone.utc)
            version_code = str(1000000000 + int((now - base).total_seconds() // 60))

        version_name = os.environ.get("ANDROID_VERSION_NAME", "1.1")

        text = re.sub(r"versionCode\s+\d+", f"versionCode {version_code}", text)
        text = re.sub(r'versionName\s+"[^"]+"', f'versionName "{version_name}"', text)

        def find_matching_brace(source, open_brace_index):
            depth = 0
            for i in range(open_brace_index, len(source)):
                ch = source[i]
                if ch == "{":
                    depth += 1
                elif ch == "}":
                    depth -= 1
                    if depth == 0:
                        return i
            return -1

        def find_block(source, block_name, start=0, end=None):
            if end is None:
                end = len(source)
            pattern = re.compile(r"(^|\n)([ \t]*)" + re.escape(block_name) + r"\s*\{")
            match = pattern.search(source, start, end)
            if not match:
                return None
            open_index = source.find("{", match.start(), match.end())
            close_index = find_matching_brace(source, open_index)
            if close_index == -1:
                return None
            return {
                "match_start": match.start(),
                "match_end": match.end(),
                "open": open_index,
                "close": close_index,
                "indent": match.group(2),
            }

        keystore_block = """def keystoreProperties = new Properties()
        def keystorePropertiesFile = rootProject.file('keystore.properties')
        if (keystorePropertiesFile.exists()) {
            keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
        }

        """

        if "keystorePropertiesFile = rootProject.file('keystore.properties')" not in text:
            plugins_block = find_block(text, "plugins")
            if plugins_block:
                insert_at = plugins_block["close"] + 1
                text = text[:insert_at] + "\n\n" + keystore_block + text[insert_at:]
            else:
                text = keystore_block + text

        android_block = find_block(text, "android")
        if not android_block:
            print("Nie znaleziono bloku android { ... } w build.gradle")
            sys.exit(1)

        android_body = text[android_block["open"] + 1:android_block["close"]]

        if "signingConfigs {" not in android_body:
            build_types = find_block(text, "buildTypes", android_block["open"], android_block["close"])
            signing_configs_block = """    signingConfigs {
                release {
                    keyAlias keystoreProperties['keyAlias']
                    keyPassword keystoreProperties['keyPassword']
                    storeFile file(keystoreProperties['storeFile'])
                    storePassword keystoreProperties['storePassword']
                }
            }

        """
            if build_types:
                text = text[:build_types["match_start"] + 1] + signing_configs_block + text[build_types["match_start"] + 1:]
            else:
                insert_at = android_block["close"]
                text = text[:insert_at] + "\n" + signing_configs_block + text[insert_at:]

        android_block = find_block(text, "android")
        build_types = find_block(text, "buildTypes", android_block["open"], android_block["close"])

        if not build_types:
            insert_at = android_block["close"]
            text = text[:insert_at] + """
            buildTypes {
                release {
                    signingConfig signingConfigs.release
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                }
            }
        """ + text[insert_at:]
        else:
            release_block = find_block(text, "release", build_types["open"], build_types["close"])
            if not release_block:
                insert_at = build_types["open"] + 1
                text = text[:insert_at] + """
                release {
                    signingConfig signingConfigs.release
                    minifyEnabled false
                    proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
                }
        """ + text[insert_at:]
            else:
                release_body = text[release_block["open"] + 1:release_block["close"]]
                if "signingConfig signingConfigs.release" not in release_body:
                    insert_at = release_block["open"] + 1
                    text = text[:insert_at] + "\n            signingConfig signingConfigs.release" + text[insert_at:]

        build_file.write_text(text)
        PY

        echo "Android build.gradle po konfiguracji:"
        grep -n "versionCode\|versionName\|signingConfig\|signingConfigs" android/app/build.gradle || true
    - name: Build signed Android App Bundle
      script: |
        cd "$APP_DIR/android"
        chmod +x ./gradlew
        ./gradlew bundleRelease
    - name: Configure iOS version
      script: |
        cd "$APP_DIR"

        python3 <<'PY'
        from pathlib import Path
        import os
        import re
        import sys

        version_name = os.environ.get("IOS_VERSION_NAME", "1.1")
        build_number = os.environ.get("IOS_BUILD_NUMBER") or os.environ.get("ANDROID_VERSION_CODE")
        if not build_number:
            from datetime import datetime, timezone
            base = datetime(2026, 1, 1, tzinfo=timezone.utc)
            now = datetime.now(timezone.utc)
            build_number = str(1000000000 + int((now - base).total_seconds() // 60))

